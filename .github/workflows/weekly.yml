name: Weekly Commits

on:
  schedule:
    - cron: '17 9 * * 2'   # Salı
    - cron: '43 15 * * 4'  # Perşembe
    - cron: '28 11 * * 1'  # Pazartesi
    - cron: '52 18 * * 3'  # Çarşamba
    - cron: '7 14 * * 5'   # Cuma

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Random commits
        run: |
          git config user.email "tuxrealkernel@gmail.com"
          git config user.name "codetabsite"
          COUNT=$((RANDOM % 3 + 3))
          for i in $(seq 1 $COUNT); do
            echo "$(date +%s)-$RANDOM" >> log.txt
            git add .
            git commit -m "update $(date +%s)"
            sleep $((RANDOM % 5 + 1))
          done
          git push
